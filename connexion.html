<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecycleCo — Connexion</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">Recycle<span>Co</span></a>
    <div class="header-droite"></div>
</header>

  <div class="page-auth">
    <h1>Se connecter</h1>
    <div id="msg-confirmation" style="display:none;" class="msg-succes">
  ✅ Votre email a bien été confirmé ! Connectez-vous maintenant.
</div>
    <p class="sous-titre">Accédez à votre espace RecycleCo</p>
    <div class="formulaire">
      <div class="champ">
        <label>Email</label>
        <input type="email" id="email" placeholder="votre@email.com" />
      </div>
      <div class="champ">
        <label>Mot de passe</label>
        <input type="password" id="mdp" placeholder="Votre mot de passe" 
  onkeydown="if(event.key==='Enter') seConnecter();" />
      </div>
      <button class="btn-submit" onclick="seConnecter()">Se connecter</button>
      <p class="lien-connexion">Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
      <p class="lien-connexion"><a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a></p>
    </div>
  </div>

  <script src="connexion.js"></script>
  <script src="header.js"></script>

<footer class="footer">
  <div class="footer-liens">
    <a href="index.html">Accueil</a>
    <a href="comment-ca-marche.html">Comment ça marche</a>
    <a href="cgu.html">CGU & Confidentialité</a>
    <a href="cgu.html#mentions">Mentions légales</a>
  </div>
  <p class="footer-copy">© 2026 RecycleCo — Tous droits réservés</p>
</footer>
<script>
window.onload = async function() {
  const params = new URLSearchParams(window.location.search);
  
  // Affiche le message si email confirmé
  if (params.get("confirmed") === "true") {
    const tokenHash = params.get("token_hash");
    const type = params.get("type");
    
    // Vérifie le token avec Supabase
    if (tokenHash) {
      const { error } = await db.auth.verifyOtp({
        token_hash: tokenHash,
        type: type || "email"
      });
      
      if (!error) {
        document.getElementById("msg-confirmation").style.display = "block";
      }
    } else {
      document.getElementById("msg-confirmation").style.display = "block";
    }
  }
};
</script>
</body>
</html>
