<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecycleCo — Nouveau mot de passe</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">Recycle<span>Co</span></a>
    <div class="header-droite"></div>
  </header>

  <div class="page-auth" style="text-align:center;padding-top:40px;">
    <div style="font-size:48px;margin-bottom:16px;">🔐</div>
    <h1 style="margin-bottom:8px;">Nouveau mot de passe</h1>
    <p style="color:#555;font-size:14px;margin-bottom:24px;">
      Choisissez un nouveau mot de passe pour votre compte.
    </p>
    <div class="formulaire" style="text-align:left;">
      <div class="champ">
        <label>Nouveau mot de passe</label>
        <input type="password" id="nouveau-mdp" placeholder="Au moins 6 caractères" />
      </div>
      <div class="champ">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirmer-mdp" placeholder="Répétez le mot de passe" />
      </div>
      <button class="btn-submit" onclick="reinitialiserMdp()">
        Enregistrer le nouveau mot de passe
      </button>
    </div>
  </div>

  <script src="header.js"></script>
  <script>
    async function reinitialiserMdp() {
      const mdp = document.getElementById("nouveau-mdp").value.trim();
      const confirm = document.getElementById("confirmer-mdp").value.trim();

      if (!mdp || !confirm) {
        alert("Merci de remplir tous les champs.");
        return;
      }
      if (mdp.length < 6) {
        alert("Le mot de passe doit faire au moins 6 caractères.");
        return;
      }
      if (mdp !== confirm) {
        alert("Les mots de passe ne correspondent pas.");
        return;
      }

      const { error } = await db.auth.updateUser({ password: mdp });

      if (error) {
        alert("Erreur : " + error.message);
        return;
      }

      alert("Mot de passe mis à jour avec succès ! ✅");
      window.location.href = "connexion.html";
    }
  </script>
</body>
</html>
